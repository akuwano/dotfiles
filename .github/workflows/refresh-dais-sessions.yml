name: Refresh DAIS sessions

on:
  schedule:
    - cron: "0 18 * * *"   # daily 03:00 JST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-dais-sessions
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch slim JSON (with body, indented)
        run: |
          python3 .claude/skills/dais-session-recommender/scripts/fetch_sessions.py \
            --format slim \
            --with-metadata \
            --output .claude/skills/dais-session-recommender/dais_sessions.slim.json

      - name: Fetch index JSON (no body, compact — WebFetch friendly)
        run: |
          python3 .claude/skills/dais-session-recommender/scripts/fetch_sessions.py \
            --format slim \
            --no-body \
            --compact \
            --with-metadata \
            --output .claude/skills/dais-session-recommender/dais_sessions.index.json

      - name: Commit if changed
        run: |
          git config user.name  "dais-refresh-bot"
          git config user.email "dais-refresh-bot@users.noreply.github.com"
          git add .claude/skills/dais-session-recommender/dais_sessions.slim.json \
                  .claude/skills/dais-session-recommender/dais_sessions.index.json
          if git diff --staged --quiet; then
            echo "No session changes."
          else
            git commit -m "chore(dais): refresh sessions slim+index JSON"
            git push
          fi
